<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Lore. — Where fandoms live.</title>
  <meta name="description" content="Lore. The voice-first TV companion. Spoiler-safe, episode-aware, built for fandoms." />

  <meta property="og:title" content="Lore. — Where fandoms live." />
  <meta property="og:description" content="The voice-first TV companion. Spoiler-safe, episode-aware, built for fandoms." />
  <meta property="og:type" content="website" />

  <!-- Inline SVG favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23000'/%3E%3Ctext x='16' y='22' font-family='system-ui' font-size='18' font-weight='700' fill='%23D4AF37' text-anchor='middle'%3EL%3C/text%3E%3C/svg%3E" />

  <!-- Preconnects for CDN performance -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com" />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (pinned versions for stability) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overscroll-behavior: none;
    }
    input, textarea { font-size: 16px; }

    /* Branded loading screen */
    .lore-splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #000 100%);
      z-index: 100;
      transition: opacity 0.4s ease-out;
    }
    .lore-splash-title {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 8px;
    }
    .lore-splash-dot {
      background: linear-gradient(135deg, #fcd34d, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lore-splash-tag {
      color: #888;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .lore-splash-spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(212,175,55,0.15);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: lore-spin 0.7s linear infinite;
    }
    @keyframes lore-spin {
      to { transform: rotate(360deg); }
    }
    .lore-splash-hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="lore-splash" class="lore-splash">
    <div class="lore-splash-title">Lore<span class="lore-splash-dot">.</span></div>
    <div class="lore-splash-tag">Where fandoms live</div>
    <div class="lore-splash-spinner"></div>
  </div>

  <div id="root"></div>

  <script type="text/babel" data-type="module" src="app.js"></script>
  <script>
    // Hide splash once React paints content into #root
    (function () {
      const splash = document.getElementById('lore-splash');
      const root = document.getElementById('root');
      const observer = new MutationObserver(() => {
        if (root.children.length > 0) {
          splash.classList.add('lore-splash-hidden');
          setTimeout(() => splash.remove(), 500);
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });
      // Safety timeout so splash never gets stuck
      setTimeout(() => {
        if (document.getElementById('lore-splash')) {
          splash.classList.add('lore-splash-hidden');
          setTimeout(() => splash.remove(), 500);
        }
      }, 8000);
    })();
  </script>
</body>
</html>
